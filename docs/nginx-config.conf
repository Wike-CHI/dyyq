server
{
    listen 80;
    server_name 47.110.50.7;
    index index.html index.htm;
    root /www/wwwroot/default/dyyq/out;
    include /www/server/panel/vhost/nginx/extension/47.110.50.7/*.conf;

    #CERT-APPLY-CHECK--START
    # 用于SSL证书申请时的文件验证相关配置 -- 请勿删除
    include /www/server/panel/vhost/nginx/well-known/47.110.50.7.conf;
    #CERT-APPLY-CHECK--END

    #SSL-START SSL相关配置，请勿删除或修改下一行带注释的404规则
    #error_page 404/404.html;
    #SSL-END

    #ERROR-PAGE-START  错误页配置，可以注释、删除或修改
    error_page 404 /404.html;
    #error_page 502 /502.html;
    #ERROR-PAGE-END

    #REWRITE-START URL重写规则引用,修改后将导致面板设置的伪静态规则失效
    include /www/server/panel/vhost/rewrite/47.110.50.7.conf;
    #REWRITE-END

    #禁止访问的文件或目录
    location ~ ^/(\.user.ini|\.htaccess|\.git|\.env|\.svn|\.project|LICENSE|README.md)
    {
        return 404;
    }

    #一键申请SSL证书验证目录相关设置
    location ~ \.well-known{
        allow all;
    }

    #禁止在证书验证目录放入敏感文件
    if ( $uri ~ "^/\.well-known/.*\.(php|jsp|py|js|css|lua|ts|go|zip|tar\.gz|rar|7z|sql|bak)$" ) {
        return 403;
    }

    # 首页
    location = / {
        try_files $uri /index.html;
    }

    # SPA 路由支持（所有其他路由）
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Next.js 静态资源缓存
    location /_next/static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # 图片缓存
    location /img/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # 字体缓存
    location /fonts/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # 其他静态资源缓存
    location ~* \.(js|css|png|jpg|jpeg|gif|webp|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # API 代理（如果需要）
    location /api/ {
        try_files $uri $uri/ /api/index.html;
    }

    access_log  /www/wwwlogs/47.110.50.7.log;
    error_log  /www/wwwlogs/47.110.50.7.error.log;
}
